<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Chat App - Material Design 3</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <header class="app-header">
            <div class="header-left">
                <h1 class="app-title">💬 ChatHub</h1>
            </div>
            <div class="header-right">
                <button id="themeToggle" class="icon-btn theme-toggle" title="Toggle Theme">🌙</button>
                <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Conversations</h2>
                    <button id="newChatBtn" class="btn btn-icon" title="New Chat">➕</button>
                </div>
                <div class="search-container">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search...">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="conversations-list" id="conversationsList"></div>
            </aside>

            <main class="chat-area">
                <div class="chat-header" id="chatHeader">
                    <div class="chat-info">
                        <div class="chat-avatar">👤</div>
                        <div class="chat-details">
                            <h2 id="chatName">Select a conversation</h2>
                            <p id="chatStatus" class="chat-status">No conversation selected</p>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="icon-btn" title="Call">📞</button>
                        <button class="icon-btn" title="Video Call">📹</button>
                        <button class="icon-btn" title="More">⋮</button>
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <div class="empty-state">
                        <div class="empty-state-icon">💭</div>
                        <h3>No messages yet</h3>
                        <p>Select a conversation or start a new chat</p>
                    </div>
                </div>

                <div class="typing-indicator" id="typingIndicator" style="display: none;">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>

                <div class="message-input-area">
                    <div class="input-wrapper">
                        <button class="icon-btn" id="attachBtn" title="Attach">📎</button>
                        <input type="file" id="fileInput" style="display: none;">
                        <input type="text" id="messageInput" class="message-input" placeholder="Type your message...">
                        <button class="icon-btn" id="emojiBtn" title="Emoji">😊</button>
                    </div>
                    <button id="sendBtn" class="btn btn-primary btn-send">📤</button>
                </div>
            </main>
        </div>
    </div>

    <div id="authModal" class="modal" style="display: none;">
        <div class="modal-content auth-modal">
            <div class="modal-header">
                <h2>Welcome to ChatHub</h2>
                <button class="modal-close" id="closeAuthModal">✕</button>
            </div>
            <div class="modal-body">
                <form id="loginForm" class="auth-form">
                    <h3>Login</h3>
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                    <p class="auth-toggle">Don't have an account? <a href="#" onclick="toggleAuthForm(event)">Sign up</a></p>
                </form>

                <form id="signupForm" class="auth-form" style="display: none;">
                    <h3>Create Account</h3>
                    <div class="form-group">
                        <label for="signupName">Name</label>
                        <input type="text" id="signupName" required placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                    <p class="auth-toggle">Already have an account? <a href="#" onclick="toggleAuthForm(event)">Login</a></p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
